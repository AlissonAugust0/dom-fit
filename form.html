<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulariot</title>
    <link rel="stylesheet" href="form.css">
    <link rel="shortcut icon" href="imagem/logo.png" type="image/x-icon">
    <link rel="shortcut icon" href="imagens/Dom-Fit__força_e_virtude-removebg-preview.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="container">
            <div class="container-img">

               
                <h2>Login</h2>

                <img src="imagens/Dom-Fit__força_e_virtude-removebg-preview.png" alt="" class="logo">
            </div>

            <form action="">
                <div class="input-group">
                    <label for="">Login</label>
                    <input type="email" placeholder="Digite seu login" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" placeholder="Digite sua Senha" required>
                </div>

                <div class="links">
                    <a href="">Esqueci minha senha</a>
                    <a href="">Não tenho cadastro</a>
                </div>

                <input type="submit" class="btn" >
            </form>

            <button class="google-btn">
                <img src="imagens/google.png" alt="icon google">
                Entrar com Google
            </button>
        </div>
    </main>
    
</body>
</html>
